# This workflow will set up node 14.x, install dependencies and build the Vue project
name: Build Vue Project

# Controls when the action will run.
on:
  push:
    branches:
      - main

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 14.x
        uses: actions/setup-node@v3
        with:
          node-version: 14.x
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: |
          cd src
          npm install

      - name: Build project
        run: |
          cd src
          npm run build

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: src/dist
          retention-days: 1

      - name: Check out the repository
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git fetch origin
          git add src/package-lock.json
          git commit -m "action commit"
          git checkout -b out origin/out

      - name: Copy production artifacts
        run: |
          /bin/cp -rf ./src/dist ./

      - name: Push production artifacts
        run: |
          git add dist
          git commit -m "action commit"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:out